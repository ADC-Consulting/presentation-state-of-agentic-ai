server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Serve .mov with the correct type so the <video> tag plays it
    types {
        text/html                             html;
        text/css                              css;
        application/javascript                js;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        video/quicktime                       mov;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Long cache for static assets, no-cache for the HTML entry point
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(css|js|png|jpg|jpeg|mov)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
